name: Schema Validation

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML syntax
        run: |
          python - <<'PY'
          import glob, yaml
          for p in glob.glob('**/*.yaml', recursive=True):
              with open(p, 'r', encoding='utf-8') as f:
                  yaml.safe_load(f)
          print('YAML syntax OK')
          PY
