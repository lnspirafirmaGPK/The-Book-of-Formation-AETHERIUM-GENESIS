# Global Manifest Schema
# Purpose: Index and relationship tracking for all formations in the repository.
type: object
required:
  - repository_name
  - last_updated
  - formations
  - lineage_registry
properties:
  repository_name: { type: string }
  last_updated: { type: string, format: date-time }
  formations:
    type: array
    items:
      type: object
      required: [formation_id, path, status, version]
      properties:
        formation_id: { type: string }
        path: { type: string }
        status: { type: string }
        version: { type: string }
  lineage_registry:
    type: array
    items:
      type: object
      required: [source_id, relation, target_id]
      properties:
        source_id: { type: string }
        relation: { type: string, enum: [derived_from, variant_of, supersedes] }
        target_id: { type: string }
