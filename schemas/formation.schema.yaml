$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://aetherium.local/schemas/formation.schema.yaml"
title: Formation Definition
type: object
required:
  - formation_id
  - phase
  - archetype
  - emotion_tone
  - tempo
  - intensity_range
  - continuity_profile
  - shader_bias
  - particle_bias
  - physics_bias
  - semantics
  - source_files
  - version
properties:
  formation_id:
    type: string
    pattern: "^[a-z0-9-]+$"
  phase:
    type: string
    enum: [emergence, stabilization, dissolution]
  archetype:
    type: string
  emotion_tone:
    type: string
  tempo:
    type: string
    enum: [very_slow, slow, medium, fast, very_fast]
  intensity_range:
    type: object
    required: [min, max]
    properties:
      min: { type: number, minimum: 0, maximum: 1 }
      max: { type: number, minimum: 0, maximum: 1 }
  continuity_profile:
    type: string
    enum: [continuous, pulsed, intermittent]
  shader_bias:
    type: object
    additionalProperties: { type: number }
  particle_bias:
    type: object
    additionalProperties: { type: number }
  physics_bias:
    type: object
    additionalProperties: { type: number }
  semantics:
    type: object
    required: [human_narrative, machine]
    properties:
      human_narrative: { type: string }
      machine:
        type: object
        required: [onset_speed, expansion_curve, turbulence, coherence, decay_tail]
        properties:
          onset_speed: { type: string, enum: [slow, medium, fast] }
          expansion_curve: { type: string, enum: [linear, sigmoid, exponential] }
          turbulence: { type: string, enum: [low, medium, high] }
          coherence: { type: string, enum: [low, medium, high] }
          decay_tail: { type: string, enum: [short, medium, long] }
  source_files:
    type: array
    items: { type: string }
  author_note:
    type: string
  provenance:
    type: object
    properties:
      parent_formation_id: { type: string }
      commit: { type: string }
      created_by: { type: string }
      created_at: { type: string, format: date-time }
  version:
    type: string
    pattern: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
additionalProperties: false
